name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and minify
        run: yarn build

      - name: Upload dist to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_PREFIX: ${{ vars.CLOUDFLARE_R2_PREFIX }}
        run: |
          set -euo pipefail

          ENDPOINT_URL="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          DESTINATION="s3://${CLOUDFLARE_R2_BUCKET}"

          if [ -n "${CLOUDFLARE_R2_PREFIX:-}" ]; then
            DESTINATION="${DESTINATION}/${CLOUDFLARE_R2_PREFIX#/}"
          fi

          aws s3 sync dist/ "${DESTINATION}" --delete --endpoint-url "${ENDPOINT_URL}"
